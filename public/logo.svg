<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Definicje cieni i gradientów dla głębi -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="leafGradient">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </radialGradient>
  </defs>

  <!-- Główne tło (delikatne podświetlenie) -->
  <rect width="100%" height="100%" fill="#f1f8e9" rx="15" ry="15"/>

  <!-- Tło grafiki - subtelna poświata pioruna -->
  <path d="M150 50 L250 200 L200 250 L280 400 L200 450 L250 550" stroke="#e1f5fe" stroke-width="20" fill="none" opacity="0.3" filter="url(#shadow)"/>

  <!-- Główna łodyga w kształcie pioruna (Organiczna, zielona) -->
  <path d="M150 60 C160 80, 240 180, 250 190 L210 240 L280 390 L210 440 L250 540" 
        stroke="#1b5e20" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>

  <!-- Liście wyrastające z łodygi -->
  <!-- Górny liść -->
  <path d="M180 100 Q150 120, 180 140 Q210 120, 180 100" fill="url(#leafGradient)" transform="rotate(-30 180 120)"/>
  
  <!-- Środkowe liście (pary) -->
  <path d="M240 210 Q210 230, 240 250 Q270 230, 240 210" fill="url(#leafGradient)"/>
  <path d="M210 210 Q240 230, 210 250 Q180 230, 210 210" fill="url(#leafGradient)" transform="rotate(20 210 230)"/>

  <path d="M260 360 Q230 380, 260 400 Q290 380, 260 360" fill="url(#leafGradient)" transform="rotate(-15 260 380)"/>
  <path d="M220 360 Q250 380, 220 400 Q190 380, 220 360" fill="url(#leafGradient)" transform="rotate(30 220 380)"/>

  <!-- Dolny liść -->
  <path d="M230 480 Q200 500, 230 520 Q260 500, 230 480" fill="url(#leafGradient)"/>

  <!-- Kwiat/Pąk na szczycie (Symbol energii/światła) -->
  <circle cx="150" cy="60" r="15" fill="#fbc02d" filter="url(#shadow)"/>
  <circle cx="150" cy="60" r="8" fill="#fff9c4"/>

  <!-- Korzenie (Delikatniejsze, zygzakowate) -->
  <path d="M250 540 Q240 560, 260 570" stroke="#5d4037" stroke-width="4" fill="none"/>
  <path d="M250 540 Q260 560, 240 570" stroke="#5d4037" stroke-width="4" fill="none"/>
  <path d="M250 540 Q250 565, 250 580" stroke="#5d4037" stroke-width="3" fill="none"/>

</svg>
